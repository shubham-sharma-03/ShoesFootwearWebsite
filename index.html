<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footwear</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <a href="#" class="hamburger">
    <i class="fa-solid fa-bars"></i>
  </a>

  <a href="#" class="phone">
    <i class="fa-solid fa-phone-flip"></i>
  </a>

  <div class="logo">
    <i class="fa-solid fa-shoe-prints"></i>
    <h2>Shoe are Us</h2>
    <p>Find the right fit for you</p>
  </div>

  <div class="carousel-container">
    <div class="carousel" id="carousel">
      <div class="slide" data-bg="cb021c">
      <img src="shoe.1.jpg" alt="shoe.1"/>
      <h1>Performance</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#D9D9D9">
      <img src="shoe.2.jpg" alt="shoe.2"/>
      <h1>Design</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#A6D940">
      <img src="shoe.3.jpg" alt="shoe.3"/>
      <h1>Runner</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#8C8C8C">
      <img src="shoe.4.jpg" alt="shoe.4"/>
      <h1>Comodity</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#000000">
      <img src="shoe.5.jpg" alt="shoe.5"/>
      <h1>Casual</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#FFFFFF">
      <img src="shoe.6.jpg" alt="shoe.6"/>
      <h1>Stylish</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#262626">
      <img src="shoe.7.jpg" alt="shoe.7"/>
      <h1>Awesome</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#D9C0A6">
      <img src="shoe.8.jpg" alt="shoe.8"/>
      <h1>Lightness</h1>
      <a href="#">Learn More</a>
    </div>

    <div class="slide" data-bg="#006aff">
      <img src="shoe.9.jpg" alt="shoe.9"/>
      <h1>Thunder Bolt</h1>
      <a href="#">Learn More</a>
    </div>
</div>
  
<button id="left" class="left-arrow arrow">
      <i class="fa-solid fa-angle-left"></i>
    </button>

    <button id="right" class="right-arrow arrow">
      <i class="fa-solid fa-angle-right"></i>
    </button>

    <div class="progress">
</div>
</body>
</html>
